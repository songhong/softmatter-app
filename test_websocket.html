<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Streamlit WebSocket Connection Test</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(div);
        }
        
        // Test 1: Basic HTTP connection
        log('Testing HTTP connection to localhost:8503...');
        fetch('http://localhost:8503/_stcore/health')
            .then(r => r.text())
            .then(t => {
                log(`HTTP Health: ${t}`, t === 'ok' ? 'ok' : 'error');
                
                // Test 2: WebSocket connection
                log('Testing WebSocket connection...');
                const ws = new WebSocket('ws://localhost:8503/_stcore/stream');
                
                ws.onopen = () => {
                    log('WebSocket CONNECTED!', 'ok');
                    ws.close();
                };
                
                ws.onerror = (e) => {
                    log('WebSocket ERROR - Connection failed', 'error');
                    log('This is likely the cause of the white screen!', 'error');
                };
                
                ws.onclose = (e) => {
                    if (e.code !== 1000) {
                        log(`WebSocket closed with code: ${e.code}`, 'error');
                    }
                };
                
                setTimeout(() => {
                    if (ws.readyState === WebSocket.CONNECTING) {
                        log('WebSocket TIMEOUT - Connection timed out', 'error');
                        ws.close();
                    }
                }, 5000);
            })
            .catch(e => {
                log(`HTTP ERROR: ${e.message}`, 'error');
            });
    </script>
</body>
</html>
